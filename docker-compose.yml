version: "3.9"

services:
  keycloak:
    image: quay.io/keycloak/keycloak:26.4.7
    container_name: keycloak_dev
    command: start-dev
    environment:
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
    ports:
      - "8082:8080"
    volumes:
      - ./DKForge-Business:/opt/keycloak/themes/DKForge-Business